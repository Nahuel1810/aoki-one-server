<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aoki One MVP</title>
    <style>
      :root {
        --bg: #f5f7f2;
        --panel: #ffffff;
        --ink: #17211a;
        --muted: #5b6a5f;
        --accent: #2f6f44;
        --danger: #b42318;
        --ok: #047857;
        --border: #d6dfd3;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background: radial-gradient(1000px 500px at -10% -20%, #ffffff 0%, #f7faf6 55%, #f1f5ef 100%);
      }

      .wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 40px; }
      .grid { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }

      h1 { margin: 0 0 8px; }
      h2 { margin: 0 0 12px; font-size: 17px; }
      p { margin: 0 0 14px; color: var(--muted); }

      label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
      input, select, button {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        font-weight: 700;
        cursor: pointer;
      }

      .status { margin-top: 10px; font-size: 14px; }
      .status.ok { color: var(--ok); }
      .status.err { color: var(--danger); }

      .mono {
        margin: 0;
        padding: 12px;
        border-radius: 10px;
        background: #111827;
        color: #cbd5e1;
        overflow: auto;
        max-height: 360px;
        font-family: Consolas, monospace;
        font-size: 12px;
      }

      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Aoki One MVP</h1>
      <p>Orquestador de pedidos PICK/PUT con cola por robot, sin MQTT.</p>

      <section class="grid">
        <article class="card">
          <h2>Registrar dispositivo PLC</h2>
          <form id="deviceForm">
            <label>Robot ID</label>
            <input id="robotId" value="1" required />
            <label>Tipo</label>
            <select id="deviceType">
              <option value="CARRO">CARRO</option>
              <option value="ELEVADOR">ELEVADOR</option>
            </select>
            <label>IP PLC</label>
            <input id="host" value="192.168.1.50" />
            <label>Puerto</label>
            <input id="port" type="number" value="502" />
            <button type="submit">Registrar dispositivo</button>
          </form>
          <div id="deviceStatus" class="status"></div>
        </article>

        <article class="card">
          <h2>Crear pedido</h2>
          <form id="orderForm">
            <label>Tipo</label>
            <select id="orderType">
              <option value="PICK">PICK</option>
              <option value="PUT">PUT</option>
            </select>
            <label>Location Code</label>
            <input id="locationCode" value="30501" required />
            <label>Target Location (opcional)</label>
            <input id="targetLocation" placeholder="Ej: 90001" />
            <label>Robot ID (opcional)</label>
            <input id="orderRobotId" placeholder="Ej: 3" />
            <button type="submit">Encolar pedido</button>
          </form>
          <div id="orderStatus" class="status"></div>
        </article>
      </section>

      <section class="card" style="margin-top:16px;">
        <h2>Estado del sistema</h2>
        <pre id="stateBox" class="mono">Cargando...</pre>
      </section>
    </main>

    <script>
      const stateBox = document.getElementById("stateBox");
      const deviceStatus = document.getElementById("deviceStatus");
      const orderStatus = document.getElementById("orderStatus");

      function setStatus(el, ok, message) {
        el.className = `status ${ok ? "ok" : "err"}`;
        el.textContent = message;
      }

      async function refreshState() {
        try {
          const [robotsRes, ordersRes, devicesRes] = await Promise.all([
            fetch("/api/devices/robots"),
            fetch("/api/orders"),
            fetch("/api/devices"),
          ]);

          const robotsData = await robotsRes.json();
          const ordersData = await ordersRes.json();
          const devicesData = await devicesRes.json();

          stateBox.textContent = JSON.stringify(
            {
              robots: robotsData.data || [],
              orders: ordersData.data || [],
              devices: devicesData.data || [],
              ts: Date.now(),
            },
            null,
            2
          );
        } catch (error) {
          stateBox.textContent = `Error consultando estado: ${error.message}`;
        }
      }

      document.getElementById("deviceForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = {
            robotId: document.getElementById("robotId").value.trim(),
            type: document.getElementById("deviceType").value,
            host: document.getElementById("host").value.trim(),
            port: Number(document.getElementById("port").value),
          };

          const res = await fetch("/api/devices/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          if (!res.ok || data.ok === false) {
            setStatus(deviceStatus, false, data.error || "No se pudo registrar");
            return;
          }

          setStatus(deviceStatus, true, "Dispositivo registrado");
          await refreshState();
        } catch (error) {
          setStatus(deviceStatus, false, error.message);
        }
      });

      document.getElementById("orderForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = {
            type: document.getElementById("orderType").value,
            locationCode: document.getElementById("locationCode").value.trim(),
            targetLocation: document.getElementById("targetLocation").value.trim() || null,
            robotId: document.getElementById("orderRobotId").value.trim() || null,
          };

          const res = await fetch("/api/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          if (!res.ok || data.ok === false) {
            setStatus(orderStatus, false, data.error || "No se pudo crear pedido");
            return;
          }

          setStatus(orderStatus, true, `Pedido encolado: ${data.data.id}`);
          await refreshState();
        } catch (error) {
          setStatus(orderStatus, false, error.message);
        }
      });

      refreshState();
      setInterval(refreshState, 1500);
    </script>
  </body>
</html>
